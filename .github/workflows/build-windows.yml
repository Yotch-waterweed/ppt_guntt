name: Build Windows Executable

on:
  push:
    branches:
      - main
      - feature/windows-build
    tags:
      - 'v*'
  workflow_dispatch: # 手動実行用

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Create executable with PyInstaller
      run: |
        # streamlitのパスを取得してアセットをコピー対象に含める
        $env:STREAMLIT_PATH=$(python -c "import site; print(site.getsitepackages()[0] + '\streamlit')")
        pyinstaller --noconfirm --onedir --windowed --add-data "${env:STREAMLIT_PATH};./streamlit" --add-data "assets;./assets" --add-data "sample_data.xlsx;." run_app.py

    - name: Rename distribution folder
      run: |
        Rename-Item -Path "dist/run_app" -NewName "ppt_guntt_app"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ppt_guntt-windows
        path: dist/ppt_guntt_app
