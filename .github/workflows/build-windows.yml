name: Build Windows Executable

on:
  push:
    branches:
      - main
      - feature/windows-build
    tags:
      - 'v*'
  workflow_dispatch: # 手動実行用

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Create executable with PyInstaller
      run: |
        # streamlitのインストールパスを取得
        $env:STREAMLIT_PATH=$(python -c "import streamlit, os; print(os.path.dirname(streamlit.__file__))")

        pyinstaller --noconfirm --onedir --console `
          --copy-metadata streamlit `
          --add-data "${env:STREAMLIT_PATH};./streamlit" `
          --add-data "app.py;." `
          --add-data "gantt_generator.py;." `
          --add-data "excel_reader.py;." `
          --add-data "main.py;." `
          --add-data "sample_data.xlsx;." `
          --add-data "assets;./assets" `
          --hidden-import streamlit `
          --hidden-import streamlit.web.cli `
          --hidden-import streamlit.runtime.scriptrunner `
          run_app.py

    - name: Rename distribution folder
      run: |
        Rename-Item -Path "dist/run_app" -NewName "ppt_guntt_app"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ppt_guntt-windows
        path: dist/ppt_guntt_app
